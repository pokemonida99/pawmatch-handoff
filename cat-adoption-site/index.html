function activeQuestions(answers) {
  return QUESTIONS.filter((q) => !q.onlyIf || q.onlyIf(answers));
}

/* 加權距離配對:輸出排序後的 {cat, fit, reason} */
function matchCats(answers) {
  const pref    = { energy: 3, cuddle: 3, alone: 3, sensitive: 3, care: 2.5 };
  const weights = { energy: 1, cuddle: 1, alone: 1, sensitive: 0.8, care: 0.8 };

  if (answers.time === 'out')   { pref.alone = 5; weights.alone = 2; pref.cuddle = 2.5; }
  if (answers.time === 'shift') { pref.alone = 4.2; weights.alone = 1.6; }
  if (answers.time === 'home')  { pref.alone = 2; pref.cuddle = 4; }

  if (answers.play === 'cuddle')   { pref.cuddle = 5; weights.cuddle = 2; }
  if (answers.play === 'roommate') { pref.cuddle = 2; pref.alone = Math.max(pref.alone, 4); }
  if (answers.play === 'active')   { pref.energy = 5; weights.energy = 2; }
  if (answers.play === 'quiet')    { pref.energy = 1.5; weights.energy = 1.6; pref.cuddle = 3.5; }

  if (answers.exp === 'first') { pref.care = 1; weights.care = 1.6; pref.sensitive = 2.5; }

  if (answers.family === 'kids' || answers.family === 'both') {
    pref.sensitive = 1; weights.sensitive = 1.8; pref.energy = Math.max(pref.energy, 3);
  }
  if (answers.family === 'pets' || answers.family === 'both') {
    pref.sensitive = Math.min(pref.sensitive, 1.5); weights.sensitive = Math.max(weights.sensitive, 1.6);
  }

  return CATS.map((cat) => {
    let dist = 0, maxDist = 0;
    for (const k of Object.keys(pref)) {
      dist    += weights[k] * Math.abs(cat.vector[k] - pref[k]);
      maxDist += weights[k] * 4;
    }
    const fit = Math.max(35, Math.round(100 * (1 - dist / maxDist)));
    return { cat, fit, reason: buildReason(answers, cat) };
  }).sort((a, b) => b.fit - a.fit);
}

/* 合拍理由:必須引用使用者的答案 */
function buildReason(a, cat) {
  const v = cat.vector, n = cat.name;
  if (a.time === 'out'      && v.alone >= 4)  return `你說平日在家時間短——${n}是獨處高手,自己也能過得很好。`;
  if (a.play === 'cuddle'   && v.cuddle >= 4) return `你想要跟前跟後的陪伴——${n}的黏人程度,正好接得住。`;
  if (a.play === 'active'   && v.energy >= 4) return `你說想常常一起玩——${n}的電量,保證讓你先喊累。`;
  if (a.play === 'quiet'    && v.energy <= 2) return `你喜歡安靜的陪伴——${n}最擅長的就是不打擾的溫柔。`;
  if (a.play === 'roommate' && v.alone >= 3 && v.cuddle <= 3) return `你想找個各自安好的室友——${n}把距離感拿捏得剛剛好。`;
  if (a.exp === 'first'     && v.care <= 2)   return `第一次養貓——${n}的照顧需求單純,很適合和你一起入門。`;
  if ((a.family === 'kids' || a.family === 'pets' || a.family === 'both') && v.sensitive <= 2)
    return `你家比較熱鬧——${n}天生淡定,不怕環境裡有動靜。`;
  if (a.time === 'home'     && v.cuddle >= 3) return `你在家的時間長——${n}會很樂意當你的全職同事。`;
  return `${n}的個性和你描述的生活樣態,整體最合拍。`;
}

    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6"

/* ============================================================
 * 2. 生活樣態配對測驗(對話式、一屏一題、皆可跳過)
 * ============================================================ */
function Quiz({ openChat }) {
  const [started, setStarted] = useState(false);
  const [answers, setAnswers] = useState({});
  const [step, setStep] = useState(0);
  const [done, setDone] = useState(false);
  const [saved, setSaved] = useState({});   // 「先收藏」輕承諾

  const qs = activeQuestions(answers);
  const total = qs.length;
  const remaining = total - step;
  const q = qs[step];

  const answer = (val) => {
    const next = { ...answers };
    if (val !== undefined) next[q.id] = val;
    setAnswers(next);
    const nextQs = activeQuestions(next);
    if (step + 1 >= nextQs.length) setDone(true);
    else setStep(step + 1);
  };
  const back = () => { if (step > 0) setStep(step - 1); };
  const restart = () => { setAnswers({}); setStep(0); setDone(false); setStarted(false); };

  if (!started && !done) {
    return (
      <section id="quiz" className="bg-latte">
        <div className="max-w-3xl mx-auto px-4 py-16 md:py-20 text-center">
          <SectionTitle kicker="生活樣態配對" title="回答幾個小問題,幫你找到合拍的貓">
            5–7 題,每題都可以跳過。這不是關卡,只是讓貓咪們先認識你一點點。
          </SectionTitle>
          <CtaButton onClick={() => setStarted(true)}>開始配對</CtaButton>
        </div>
      </section>
    );
  }

  if (done) {
    const results = matchCats(answers).slice(0, 3);
    const skipped = qs.filter((qq) => answers[qq.id] === undefined).length;
    const landlordPending = answers.landlord === 'notyet';
    return (
      <section id="quiz" className="bg-latte">
        <div className="max-w-4xl mx-auto px-4 py-16">
          <SectionTitle kicker="配對結果" title="目前跟你最合拍的三隻貓">
            合拍不是分數高低,是生活節奏對得上。最終的相遇,由最了解牠們的中途陪你完成。
          </SectionTitle>

          {landlordPending && (
            <div className="max-w-2xl mx-auto mb-6 bg-cream border border-sun/40 rounded-2xl p-4 text-ink">
              <p><strong className="font-round">小提醒:</strong>先確認過房東,之後的旅程會順很多。確認好之前,可以先收藏喜歡的貓、看看牠的近況。</p>
            </div>
          )}
          {skipped >= 3 && (
            <div className="max-w-2xl mx-auto mb-6 bg-cream border border-misty rounded-2xl p-4 text-mist">
              <p>你跳過了幾題,所以這份結果比較像初次見面的直覺。想更準的話,隨時可以重新配對。</p>
            </div>
          )}

          <ol className="grid md:grid-cols-3 gap-5 list-none">
            {results.map(({ cat, fit, reason }, i) => (
              <li key={cat.id} className="bg-cream rounded-3xl p-5 flex flex-col fade-in">
                <CatAvatar cat={cat} />
                <div className="mt-4 flex items-baseline justify-between">
                  <h3 className="font-round font-black text-xl">{cat.name}</h3>
                  <span className="text-clay font-round font-bold" aria-label={`合拍度 ${fit}%`}>合拍 {fit}%</span>
                </div>
                <p className="mt-2 text-sm text-mist leading-relaxed flex-1">
                  <strong className="text-ink">為什麼合拍:</strong>{reason}
                </p>
                <div className="mt-4 flex flex-col gap-2">
                  <CtaButton onClick={() => openChat(cat, answers)}>跟中途聊聊{cat.name}</CtaButton>
                  <GhostButton onClick={() => setSaved({ ...saved, [cat.id]: true })}>
                    {saved[cat.id] ? '已收藏,會通知你牠的近況 ✓' : '先收藏,看牠的近況'}
                  </GhostButton>
                  <p className="text-sm text-mist text-center">先見面、可試相處,不用一次決定。</p>
                </div>
              </li>
            ))}
          </ol>

          <div className="text-center mt-8">
            <button type="button" onClick={restart}
              className="min-h-[44px] px-4 text-mist underline underline-offset-4 hover:text-ink">重新配對一次</button>
          </div>
        </div>
      </section>
    );
  }

  return (
    <section id="quiz" className="bg-latte">
      <div className="max-w-2xl mx-auto px-4 py-16 md:py-20">
        {/* 貓掌進度:正向句式 */}
        <div className="text-center mb-8" aria-live="polite">
          <div className="flex justify-center gap-1.5 mb-2" aria-hidden="true">
            {qs.map((qq, i) => <PawIcon key={qq.id} filled={i < step} />)}
          </div>
          <p className="text-mist font-round font-bold">
            {remaining <= 1 ? '最後一題,答完就能看結果!' : `還差 ${remaining} 題就能看結果`}
          </p>
        </div>

        <div key={q.id} className="bg-cream rounded-3xl p-6 md:p-8 fade-in">
          <h3 className="font-round font-black text-2xl text-ink">{q.title}</h3>
          {q.hint && <p className="mt-2 text-sun">{q.hint}</p>}
          <div className="mt-6 flex flex-col gap-3">
            {q.options.map((opt) => (
              <button key={opt.value} type="button" onClick={() => answer(opt.value)}
                className="min-h-[52px] px-5 rounded-2xl bg-latte text-left font-medium text-ink
                  hover:bg-misty hover:translate-x-1 transition-all">
                {opt.label}
              </button>
            ))}
          </div>
          <div className="mt-6 flex items-center justify-between">
            <button type="button" onClick={back} disabled={step === 0}
              className="min-h-[44px] px-3 text-mist disabled:opacity-40 underline underline-offset-4 hover:text-ink">
              上一題
            </button>
            <button type="button" onClick={() => answer(undefined)}
              className="min-h-[44px] px-3 text-mist underline underline-offset-4 hover:text-ink">
              跳過這題
            </button>
          </div>
        </div>
      </div>
    </section>
  );
}

      summary: ['大部分時間都在家', '這會是第一隻貓', '期待黏人一點的相處', '房東已同意養貓'],
    },
    {
      id: 'm2', cat: '小虎', from: 'H**o',
      summary: ['排班、時間不固定', '家裡現在也有貓', '想常常一起玩'],
    },
  ];
  const passports = [{ cat: '芝麻', item: '年度健檢', due: '2026-07-19' }];

  return (
    <main id="main" className="max-w-5xl mx-auto px-4 py-10">
      <button type="button" onClick={() => setPage('site')}
        className="min-h-[44px] text-mist underline underline-offset-4 hover:text-ink">← 回到網站</button>
      <h1 className="mt-4 font-round font-black text-3xl text-ink">早安,花花姐姐</h1>
      <p className="mt-1 text-mist">今天有 3 件事,系統能幫忙的都準備好了——你只要按幾個鍵。</p>

      {/* 久未曬貓:黃色關心,不是紅色警報 */}
      <section className="mt-8" aria-label="好久不見的貓">
        <h2 className="font-round font-bold text-xl text-ink">好久不見的貓({quietOnes.length})</h2>
        <p className="text-sm text-mist mt-1">很久沒曬貓不一定有事,多半只是生活太忙。兩種問候,你挑一種:</p>
        <ul className="mt-3 grid gap-3 list-none">
          {quietOnes.map((q) => (
            <li key={q.name} className="bg-[#FFF7E6] border border-sun/30 rounded-2xl p-4 flex flex-wrap items-center gap-3">
              <div className="flex-1 min-w-[180px]">
                <p className="font-round font-bold text-ink">{q.name}(認養人 {q.adopter})</p>
                <p className="text-sm text-mist">上次曬貓:{q.last}</p>
              </div>
              {reminded[q.name] ? (
                <p className="text-meadow font-medium">已送出 ✓</p>
              ) : (
                <div className="flex gap-2 flex-wrap">
                  <GhostButton onClick={() => setReminded({ ...reminded, [q.name]: 1 })} className="text-sm min-h-[44px]">
                    送出溫柔提醒(系統名義)
                  </GhostButton>
                  <GhostButton onClick={() => setReminded({ ...reminded, [q.name]: 1 })} className="text-sm min-h-[44px]">
                    私訊關心(我的名義)
                  </GhostButton>
                </div>
              )}
            </li>
          ))}
        </ul>
      </section>

      {/* 待回覆配對訊息 */}
      <section className="mt-10" aria-label="想認識你家貓的人">
        <h2 className="font-round font-bold text-xl text-ink">想認識你家貓的人({messages.length})</h2>
        <p className="text-sm text-mist mt-1">「不合適」不會通知對方原因——系統會溫柔地幫他們轉介其他合拍的貓。</p>
        <ul className="mt-3 grid md:grid-cols-2 gap-3 list-none">
          {messages.map((m) => (
            <li key={m.id} className="bg-white rounded-2xl p-5 shadow-sm">
              <p className="font-round font-bold text-ink">{m.from} 想聊聊 <span className="text-clay">{m.cat}</span></p>
              <ul className="mt-2 text-sm text-mist list-disc list-inside">
                {m.summary.map((s) => <li key={s}>{s}</li>)}
              </ul>
              {decisions[m.id] ? (
                <div className="mt-3">
                  <p className="text-meadow font-medium">已標記:{decisions[m.id]} ✓</p>
                  {decisions[m.id] === '不合適' && (
                    <p className="mt-1 text-sm text-mist">系統已幫 {m.from} 轉介三隻同樣合拍的貓,他不會空手而回。</p>
                  )}
                </div>
              ) : (
                <div className="mt-3 flex gap-2 flex-wrap">
                  {['聊聊看', '再想想', '不合適'].map((d) => (
                    <button key={d} type="button" onClick={() => setDecisions({ ...decisions, [m.id]: d })}
                      className={`min-h-[44px] px-4 rounded-full font-medium border-2
                        ${d === '聊聊看' ? 'border-meadow text-meadow hover:bg-meadow hover:text-white'
                          : 'border-misty text-mist hover:bg-misty'}`}>
                      {d}
                    </button>
                  ))}
                </div>
              )}
            </li>
          ))}
        </ul>
      </section>

      {/* 待更新健康護照 */}
      <section className="mt-10" aria-label="健康護照待更新">
        <h2 className="font-round font-bold text-xl text-ink">健康護照待更新({passports.length})</h2>
        <ul className="mt-3 grid gap-3 list-none">
          {passports.map((p) => (
            <li key={p.cat} className="bg-white rounded-2xl p-4 flex items-center justify-between flex-wrap gap-3 shadow-sm">
              <p className="text-ink"><strong className="font-round">{p.cat}</strong>|{p.item}(預計 {p.due})</p>
              <GhostButton className="text-sm">完成後一鍵更新</GhostButton>
            </li>
          ))}
        </ul>
      </section>
    </main>
  );
}

/* ============================================================
 * 透明帳本頁(B5)
 * ============================================================ */
function LedgerPage({ setPage }) {
  const [month, setMonth] = useState('all');
  const [cat, setCat] = useState('all');
  const months = ['all', ...new Set(LEDGER.map((l) => l.month))];
  const catsK = ['all', ...new Set(LEDGER.map((l) => l.cat))];
  const rows = LEDGER.filter((l) => (month === 'all' || l.month === month) && (cat === 'all' || l.cat === cat));
  const balance = rows.reduce((s, l) => s + l.amount, 0);

  return (
    <main id="main" className="max-w-4xl mx-auto px-4 py-10">
      <button type="button" onClick={() => setPage('site')}
        className="min-h-[44px] text-mist underline underline-offset-4 hover:text-ink">← 回到網站</button>
      <h1 className="mt-4 font-round font-black text-3xl text-ink">公開帳本</h1>
      <p className="mt-1 text-lg text-mist">每一塊錢的來去,都在這裡。</p>

      <div className="mt-6 flex flex-wrap gap-3">
        <label className="flex items-center gap-2 text-sm text-mist">
          月份
          <select value={month} onChange={(e) => setMonth(e.target.value)}
            className="min-h-[44px] rounded-xl border border-misty bg-white px-3">
            {months.map((m) => <option key={m} value={m}>{m === 'all' ? '全部' : m}</option>)}
          </select>
        </label>
        <label className="flex items-center gap-2 text-sm text-mist">
          類別
          <select value={cat} onChange={(e) => setCat(e.target.value)}
            className="min-h-[44px] rounded-xl border border-misty bg-white px-3">
            {catsK.map((c) => <option key={c} value={c}>{c === 'all' ? '全部' : c}</option>)}
          </select>
        </label>
      </div>

      <p className="mt-4 text-sm text-mist">篩選範圍小計:
        <strong className={balance >= 0 ? 'text-meadow' : 'text-clay'}> NT$ {balance.toLocaleString()}</strong>
      </p>

      <div className="mt-3 overflow-x-auto">
        <table className="w-full text-sm border-collapse min-w-[560px]">
          <caption className="sr-only">贊助收入與支出流水帳</caption>
          <thead>
            <tr className="text-left text-mist border-b border-misty">
              <th scope="col" className="py-3 pr-3 font-medium">日期</th>
              <th scope="col" className="py-3 pr-3 font-medium">來源/用途</th>
              <th scope="col" className="py-3 pr-3 font-medium text-right">金額</th>
              <th scope="col" className="py-3 font-medium">憑證</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((l, i) => (
              <tr key={i} className="border-b border-latte">
                <td className="py-3 pr-3 whitespace-nowrap text-mist">{l.date}</td>
                <td className="py-3 pr-3 text-ink">
                  <span className="inline-block text-xs bg-latte rounded-full px-2 py-0.5 mr-2 text-mist">{l.cat}</span>
                  {l.item}
                </td>
                <td className={`py-3 pr-3 text-right whitespace-nowrap font-medium ${l.amount >= 0 ? 'text-meadow' : 'text-ink'}`}>
                  {l.amount >= 0 ? '+' : '−'}NT$ {Math.abs(l.amount).toLocaleString()}
                </td>
                <td className="py-3">
                  <span className="inline-block h-8 w-11 rounded border border-misty bg-latte" role="img"
                    aria-label={`${l.item} 的憑證縮圖`}></span>
                </td>
              </tr>
            ))}
            {rows.length === 0 && (
              <tr><td colSpan="4" className="py-8 text-center text-mist">
                這個篩選條件下還沒有紀錄。換個月份或類別看看。
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
      <p className="mt-4 text-xs text-mist">所有憑證原件可申請調閱。此頁為示意,資料皆為假資料。</p>
    </main>
  );
}

/* ============================================================
 * App
 * ============================================================ */
function App() {
  const [page, setPage] = useState('site');           // site | admin | ledger
  const [chat, setChat] = useState(null);             // { cat, answers }
  const openChat = (cat, answers) => setChat({ cat, answers });

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  if (page === 'admin')  return (<div><Nav setPage={setPage} /><AdminPage setPage={setPage} /></div>);
  if (page === 'ledger') return (<div><Nav setPage={setPage} /><LedgerPage setPage={setPage} /></div>);

  return (
    <div>
      <Nav setPage={setPage} />
      <main id="main">
        <Hero />
        <Quiz openChat={openChat} />
        <CatsSection openChat={openChat} />
        <Journey />
        <Album />
        <Support setPage={setPage} />
      </main>
      <Footer setPage={setPage} />
      {chat && <ChatModal cat={chat.cat} answers={chat.answers} onClose={() => setChat(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
